<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="/favicon.ico" type="icon/x-icon" />
    <title>Homepage</title>
  <link rel="stylesheet" href="stylesheet.css">
    <!-- ========== COMBINED STYLES ========== -->
    
</head>

<body>

    <!-- ========== ORIGINAL SEARCH SECTION ========== -->
    <div class="search-section">
        <div>
            <br><br><br><br><br>
            <h1>This is a personal homepage.</h1>
            <p>Click to search on the corresponding database or press enter to search on internet.</p>
            <br>

            <form id="searchForm" action="https://www.google.com/search" method="get">
<div style="display:flex; justify-content:space-between; align-items:center; width:80%; margin-left:auto; margin-right:auto;">
    <div style="display:flex; gap:5px;">
        <button type="button" class="searchTab" data-engine="https://www.google.com/search"
            onclick="setEngine('https://www.google.com/search', this)">Google</button>
        <button type="button" class="searchTab" data-engine="https://www.bing.com/search"
            onclick="setEngine('https://www.bing.com/search', this)">Bing</button>
    </div>
    <div style="display:flex;">
        <button class="imgbutton" type="button" onclick="searchSpecial('arxiv')">
            <img src="icon/arxiv.png" class="typeimg" alt="arXiv">
        </button>
        <button class="imgbutton" type="button" onclick="searchSpecial('GoogleScholar')">
            <img src="icon/googlescholar.png" class="typeimg" alt="googlescholar">
        </button>
    </div>
</div>

                <input id="searchInput" type="text" name="q" value="" placeholder="search web or database">
                <input type="submit" style="display:none;"> <!-- keep hidden or remove; it's fine either way -->
            </form>
        </div>
    </div>

    <!-- ========== DIVIDER ========== -->
    <div class="section-divider"></div>
    <!-- Quick Access standalone box -->
    <div id="quickAccessBox" class="tab-container">
        <br>
        <img style="margin-left: 10px;" src='icon/svg/star-sharp.svg' class="ttab-icon" alt="QuickAccess">Quick Access
        <div id="quickAccessLinks" class="display-area">
            <!-- dynamically filled -->
        </div>
    </div>
    <!-- ========== TABBED INTERFACE SECTION ========== -->
    <div class="tab-section">
        <!-- Hamburger button (visible only on small screens) -->
        <button id="tabHamburger" class="hamburger-btn" aria-label="Open tabs">☰</button>

        <!-- Overlay wrapper that holds the tab content -->
        <div id="tabOverlay" class="tab-overlay">
            <!-- Close button inside overlay (small screens) -->
            <button id="tabOverlayClose" class="overlay-close-btn" aria-label="Close tabs">✕</button>

            <div class="tab-section">
                <div class="tab-container">
                    <div class="ttab-bar" id="ttabBar">
                        <button class="ttab active" data-ttab="0"><img src='icon/svg/star-sharp.svg' class="ttab-icon"
                                alt="QuickAccess">
                            <p class="ttabtext">QuickAccess</p>
                        </button>
                        <button class="ttab" data-ttab="1"><img src='icon/svg/lightbulb-alt.svg' class="ttab-icon"
                                alt="Creation">
                            <p class="ttabtext">Creation</p>
                        </button>
                        <button class="ttab" data-ttab="2"><img src='icon/svg/gem-alt.svg' class="ttab-icon"
                                alt="Entertainment">
                            <p class="ttabtext">Entertainment</p>
                        </button>
                        <button class="ttab" data-ttab="3"><img src='icon/svg/paint-roller.svg' class="ttab-icon"
                                alt="Utilities">
                            <p class="ttabtext">Utilities</p>
                        </button>
                        <button class="ttab" data-ttab="4"><img src='icon/svg/notebook.svg' class="ttab-icon"
                                alt="Utilities">
                            <p class="ttabtext">Log</p>
                        </button>
                    </div>
                    <div class="main-body">
                        <div class="ctab-panel" id="ctabPanel"></div>
                        <div class="display-area" id="displayArea"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== COMBINED SCRIPTS ========== -->
       <script src="script.js" defer></script>
 
</body>

</html>
