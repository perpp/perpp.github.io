<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Homepage + Tabbed Interface</title>

    <!-- ========== COMBINED STYLES ========== -->
    <style>
        /* ── Global resets & CSS variables ────── */
        :root {
            /* Original search page variables (with defaults) */
            --color-tertiary: #e2e8f0;
            --color-primary: #4f46e5;
            --color-text: #1e293b;
            --color-bg: #f0f2f5;

            /* Tab interface variables */
            --tab-bg: #f0f2f5;
            --tab-card-bg: #ffffff;
            --ttab-active: #4f46e5;
            --ttab-hover: #4338ca;
            --ttab-inactive: #e0e7ff;
            --ttab-text-active: #ffffff;
            --ttab-text-inactive: #4f46e5;
            --ctab-bg: #f8fafc;
            --ctab-hover: #eef2ff;
            --ctab-active: #dbeafe;
            --ctab-text: #334155;
            --ctab-text-hover: #1e40af;
            --tab-border: #e2e8f0;
            --tab-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            --tab-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --tab-radius: 12px;
            --tab-radius-sm: 8px;
            --tab-transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #818cf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 30%, #f0f4ff 60%, #ede9fe 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Original search section styles ──── */
        .search-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px 20px 20px;
            flex-shrink: 0;
        }

        .search-section h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        .search-section p {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        #searchForm {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .imgbutton {
            margin: 10px;
            width: max(min(50px, 20%), 30px);
            height: max(min(50px, 20%), 30px);
            background-color: transparent;
            border: none;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
            border-radius: 8px;
            padding: 4px;
        }

        .imgbutton:hover {
            transform: scale(1.2);
            background: rgba(79, 70, 229, 0.06);
        }
        .typeimg {
            width: 100%;
            height: auto;
            display: block;
        }
        .texttip {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }

        .searchTab {
            padding: 6px 12px;
            background-color: var(--color-tertiary);
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .searchTab:hover {
            background-color: #cbd5e1;
        }

        .activeTab {
            color: #ffffff !important;
            background-color: var(--color-primary) !important;
            font-weight: 700;
            border-color: var(--color-primary);
        }

        #searchInput {
            width: 80%;
            height: 36px;
            padding: 0 14px;
            border: 2px solid var(--tab-border);
            border-radius: 20px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
            background: #fff;
        }
        #searchInput:focus {
            border-color: var(--ttab-active);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* ── Separator ────────────────────────── */
        .section-divider {
            width: 80%;
            max-width: 900px;
            height: 1px;
            background: linear-gradient(to right, transparent, #cbd5e1, transparent);
            margin: 10px 0 20px 0;
            opacity: 0.6;
        }

        /* ── Tab interface container ──────────── */
        .tab-section {
            width: 100%;
            max-width: 960px;
            padding: 0 20px 40px 20px;
            flex-shrink: 0;
        }

        .tab-container {
            width: 100%;
            background: var(--tab-card-bg);
            border-radius: 20px;
            box-shadow: var(--tab-shadow), 0 0 0 1px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 440px;
        }

        /* ── Top ttab bar ─────────────────────── */
        .ttab-bar {
            display: flex;
            gap: 0;
            background: #fafbfc;
            border-bottom: 2px solid var(--tab-border);
            padding: 10px 16px 0 16px;
            flex-shrink: 0;
            position: relative;
        }

        .ttab {
            padding: 14px 28px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            color: var(--ttab-text-inactive);
            background: transparent;
            border: none;
            border-radius: 12px 12px 0 0;
            position: relative;
            transition: all var(--tab-transition);
            user-select: none;
            white-space: nowrap;
            outline: none;
            z-index: 1;
        }

        .ttab:hover {
            color: var(--ttab-hover);
            background: rgba(79, 70, 229, 0.04);
        }

        .ttab.active {
            color: var(--ttab-text-active);
            background: var(--ttab-active);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -2px 8px rgba(79, 70, 229, 0.15);
            z-index: 2;
        }

        .ttab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--ttab-active);
            border-radius: 3px 3px 0 0;
        }

        /* ── Main body: left ctab panel + right display ── */
        .main-body {
            display: flex;
            flex: 1;
            min-height: 360px;
        }

        /* ── Left ctab panel ──────────────────── */
        .ctab-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 16px 12px;
            background: #fdfdfe;
            border-right: 2px solid var(--tab-border);
            min-width: 170px;
            max-width: 200px;
            flex-shrink: 0;
            transition: all var(--tab-transition);
        }

        .ctab {
            padding: 13px 18px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--ctab-text);
            background: transparent;
            border: none;
            border-radius: var(--tab-radius-sm);
            text-align: left;
            transition: all var(--tab-transition);
            user-select: none;
            outline: none;
            position: relative;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .ctab:hover {
            background: var(--ctab-hover);
            color: var(--ctab-text-hover);
            font-weight: 600;
            padding-left: 22px;
            box-shadow: var(--tab-shadow-sm);
            transform: translateX(2px);
        }

        .ctab.active {
            background: var(--ctab-active);
            color: #1e40af;
            font-weight: 700;
            box-shadow: inset 3px 0 0 0 var(--ttab-active);
            padding-left: 20px;
        }

        /* ── Right display area ───────────────── */
        .display-area {
            flex: 1;
            padding: 28px 32px;
            background: #ffffff;
            overflow-y: auto;
            transition: all var(--tab-transition);
            position: relative;
        }

        .display-content {
            animation: fadeSlideIn 0.35s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .display-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .display-content .badge {
            display: inline-block;
            background: var(--ttab-inactive);
            color: var(--ttab-active);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .display-content p {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .display-content .info-card {
            background: #f8fafc;
            border: 1px solid var(--tab-border);
            border-radius: var(--tab-radius-sm);
            padding: 16px 20px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #475569;
            border-left: 4px solid var(--accent);
        }

        .display-content .info-card strong {
            color: var(--text-primary);
        }
        /* Hamburger button */
.hamburger-btn {
  display: none;
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10000;
  background: var(--ttab-active, #4f46e5);
  color: white;
  border: none;
  font-size: 1.5rem;
  width: 40px;
  height: 40px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Overlay wrapper */
.tab-overlay {
  /* On desktop: normal flow */
}

/* Overlay close button (inside overlay, hidden on desktop) */
.overlay-close-btn {
  display: none;
  position: absolute;
  top: 15px;
  right: 15px;
  z-index: 10001;
  background: transparent;
  border: none;
  font-size: 1.8rem;
  color: var(--text-primary, #1e293b);
  cursor: pointer;
}

/* Small screens: hide tab section by default, show hamburger */
@media (max-width: 999px) {
  .tab-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    background: var(--tab-card-bg, #fff);
    overflow-y: auto;
    padding: 20px;
  }

  .tab-overlay.open {
    display: block;
  }

  .hamburger-btn {
    display: block;
  }

  .overlay-close-btn {
    display: block;
  }

  /* Make the tab-section inside overlay full width and adjust */
  .tab-overlay .tab-section {
    width: 100%;
    max-width: 100%;
    padding: 0;
    margin-top: 40px; /* space for close button */
  }

  .tab-overlay .tab-container {
    min-height: 100%;
    border-radius: 0;
  }
}

        /* ── Responsive ───────────────────────── */

                height: 32px;

    <script>
  // ──────────────────────────────────────────
// SEARCH ENGINE MANAGEMENT
// ──────────────────────────────────────────
let currentEngine = 'https://www.google.com/search';

// Load saved engine on startup
window.addEventListener('DOMContentLoaded', () => {
    const savedEngine = localStorage.getItem('searchEngine');
    if (savedEngine) {
        currentEngine = savedEngine;
        const matchingTab = document.querySelector(`.searchTab[data-engine="${savedEngine}"]`);
        if (matchingTab) {
            document.querySelectorAll('.searchTab').forEach(tab => tab.classList.remove('activeTab'));
            matchingTab.classList.add('activeTab');
        }
    } else {
        const firstTab = document.querySelector('.searchTab');
        if (firstTab) firstTab.classList.add('activeTab');
    }
});

// Engine switching
window.setEngine = function(url, element) {
    currentEngine = url;
    localStorage.setItem('searchEngine', url);
    document.querySelectorAll('.searchTab').forEach(tab => tab.classList.remove('activeTab'));
    element.classList.add('activeTab');
};

// Special icon search (does NOT affect the form)
function searchSpecial(target) {
    const query = document.getElementById('searchInput').value.trim();

    if (target === 'arxiv') {
        if (!query) {
            window.location.href = 'https://arxiv.org/';
        } else {
            window.location.href = `https://arxiv.org/search/?query=${encodeURIComponent(query)}`;
        }
    } else {
        // games, books, songs → Google Scholar
        if (!query) {
            window.location.href = 'https://scholar.google.com/';
        } else {
            window.location.href = `https://scholar.google.com/scholar?q=${encodeURIComponent(query)}`;
        }
    }
}
// Form submission (Enter key or hidden submit button) → always normal web search
document.getElementById('searchForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    window.location.href = `${currentEngine}?q=${encodeURIComponent(query)}`;
});

                ctabPanel.innerHTML = '';
                ctabsData.forEach((ctab, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'ctab';
                    if (idx === activeCtab) btn.classList.add('active');
                    btn.textContent = ctab.label;
                    btn.setAttribute('data-ctab', idx);
                    btn.addEventListener('mouseenter', () => setActiveCtab(idx, ttabIndex));
                    btn.addEventListener('click', () => setActiveCtab(idx, ttabIndex));
                    btn.addEventListener('focus', () => setActiveCtab(idx, ttabIndex));
                    ctabPanel.appendChild(btn);
                });
            }

            function setActiveCtab(ctabIndex, ttabIndex) {
                activeCtab = ctabIndex;
                const ctabButtons = ctabPanel.querySelectorAll('.ctab');
                ctabButtons.forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === ctabIndex);
                });
                updateDisplay(ttabIndex, ctabIndex);
            }

            function updateDisplay(ttabIndex, ctabIndex) {
                const content = data[ttabIndex][ctabIndex];
                displayArea.innerHTML = `
                            <div class="display-content">
                                <h2>${content.title}</h2>
                                <span class="badge">${content.badge}</span>
                                <p>${content.description}</p>
                                <div class="info-card">${content.info}</div>
                            </div>
                        `;
            }

            function switchTtab(ttabIndex) {
                activeTtab = ttabIndex;
                activeCtab = 0;
                ttabButtons.forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === ttabIndex);
                });
                renderCtabs(ttabIndex);
                updateDisplay(ttabIndex, 0);
            }

            ttabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-ttab'), 10);
                    if (idx !== activeTtab) switchTtab(idx);
                });
            });

            // Initialize: default ttab 0 active
            renderCtabs(0);
            updateDisplay(0, 0);
        })();

(function() {
  const hamburger = document.getElementById('tabHamburger');
  const overlay = document.getElementById('tabOverlay');
  const closeBtn = document.getElementById('tabOverlayClose');

  if (hamburger && overlay && closeBtn) {
    function openOverlay() {
      overlay.classList.add('open');
    }
    function closeOverlay() {
      overlay.classList.remove('open');
    }

    hamburger.addEventListener('click', openOverlay);
    closeBtn.addEventListener('click', closeOverlay);

    // Close overlay when clicking outside the tab-container? Not necessary,
    // but you can add an overlay background click if needed.
  }
})();
