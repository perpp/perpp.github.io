<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="/favicon.ico" type="icon/x-icon" />
    <title>Homepage</title>

    <!-- ========== COMBINED STYLES ========== -->
    <style>
        @font-face {
            font-family: 'cnfont';
            src: url('icon/qhk.ttf');
            /* relative to where CSS is loaded */
        }


        /* ── Global resets & CSS variables ────── */
        :root {
            --color-primary: #eeeeff;
            --color-secondary: #ddddee;
            --color-tertiary: #ccccdd;
            --color-light: #fafaff;
            --color-contrast: #eeccaa;
            --color-button: #ddeeff;
            --color-text: #333366;
            --color-text2: #6666aa;
            --color-neutral: #666666;
            --color-opaquecard: rgba(240, 240, 255, 0.5);
            --color-opaquetext: rgba(240, 255, 240, 0.5);
            --color-opaquelight: rgba(250, 250, 255, 0.8);
            --color-opaquedark: rgba(102, 102, 170, 0.5);
            --color-shadow: rgba(33, 33, 66, 0.5);
            --tab-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            --tab-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --tab-radius: 12px;
            --tab-radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'chalkboard', 'cnfont', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--color-text) 0%, var(--color-text2) 30%, var(--color-light) 60%, var(--color-primary) 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            font-family: 'chalkboard', 'cnfont';
            justify-content: center;
        }

        /* ── Original search section styles ──── */
        .search-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px 20px 20px;
            flex-shrink: 0;
        }

        .search-section h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: var(--color-text);
        }

        .search-section p {
            color: var(--color-text2);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        #searchForm {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .imgbutton {
            width: 36px;
            height: 36px;
            background-color: transparent;
            border: none;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin:3px;
        }

        .typeimg {
            width: 30px;
            height: 30px;
        }

        .imgbutton:hover {
            transform: scale(1.2);
            background: var(--color-light);
        }

        .texttip {
            font-size: 0.7rem;
            color: var(--color-text2);
            margin-top: 2px;
            font-weight: 500;
        }

        .searchTab {
            padding: 6px 12px;
            background-color: var(--color-tertiary);
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--color-text);
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .searchTab:hover {
            background-color: var(--color-secondary);
        }

        .activeTab {
            color: var(--color-light) !important;
            background-color: var(--color-text) !important;
            font-weight: 700;
            border-color: var(--color-text);
        }

        #searchInput {
            width: 80%;
            height: 36px;
            padding: 0 14px;
            border: 2px solid var(--color-tertiary);
            border-radius: 20px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
            background: #fff;
        }

        #searchInput:focus {
            border-color: var(--color-text);
            box-shadow: 0 0 0 3px var(--color-contrast);
        }

        /* ── Separator ────────────────────────── */
        .section-divider {
            width: 80%;
            max-width: 900px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-tertiary), transparent);
            margin: 10px 0 20px 0;
            opacity: 0.6;
        }

        /* ── Tab interface container ──────────── */
        .tab-section {
            width: 100%;
            max-width: 960px;
            padding: 0 20px 40px 20px;
            flex-shrink: 0;
        }

        .tab-container {
            width: 95%;
            background: var(--color-opaquecard);
            border-radius: 20px;
            box-shadow: var(--tab-shadow), 0 0 0 1px var(--color-secondary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }

        /* ── Top ttab bar ─────────────────────── */
        .ttab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--color-tertiary);
            padding: 10px 16px 0 16px;
            flex-shrink: 0;
            position: relative;
            background: var(--color-opaquecard);
        }

        .ttab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: max(10pt, min(15pt, 1vw));
            letter-spacing: 0.01em;
            color: var(--color-text2);
            background: transparent;
            border: none;
            border-radius: 12px 12px 0 0;
            position: relative;
            transition: all var(--tab-transition);
            user-select: none;
            white-space: nowrap;
            outline: none;
            z-index: 1;
        }

        .ttab:hover {
            color: var(--color-text);
            background: var(--color-opaquecard);
        }

        .ttab.active {
            color: var(--color-light);
            background: var(--color-text);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        .ttab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-text);
            border-radius: 3px 3px 0 0;
        }

        .ttabtext {
            display: inline-flex;
        }

        /* ── Main body: left ctab panel + right display ── */
        .main-body {
            display: flex;
            flex: 1;
            min-height: 360px;
        }

        /* ── Left ctab panel ──────────────────── */
        .ctab-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 16px 12px;
            background: var(--color-opaquecard);
            border-right: 2px solid var(--color-tertiary);
            min-width: 170px;
            max-width: 200px;
            flex-shrink: 0;
            transition: all var(--tab-transition);
        }

        .ctab {
            padding: 10px 18px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-text2);
            background: transparent;
            border: none;
            border-radius: var(--tab-radius-sm);
            text-align: left;
            transition: all var(--tab-transition);
            user-select: none;
            outline: none;
            position: relative;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .ctab:hover {
            background: var(--color-secondary);
            color: var(--color-text);
            font-weight: 600;
            padding-left: 22px;
            box-shadow: var(--tab-shadow-sm);
            transform: translateX(2px);
        }

        .ctab.active {
            background: var(--color-button);
            color: var(--color-text);
            font-weight: 700;
            box-shadow: inset 3px 0 0 0 var(--color-text);
            padding-left: 20px;
        }

        .ttab-icon {
            width: 25px;
            height: 25px;
            vertical-align: middle;
            border-radius: 5px;
            background: var(--color-opaquecard);
            margin: 2px;
        }

        .ctab-icon {
            width: 1.2em;
            height: 1.2em;
            vertical-align: bottom;
            margin-right: 2px;
        }

        /* ── Right display area ───────────────── */
        .display-area {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            transition: all var(--tab-transition);
            position: relative;
            background: var(--color-light);
        }

        .display-content {
            animation: fadeSlideIn 0.35s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .display-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .display-content .badge {
            display: inline-block;
            background: var(--color-secondary);
            color: var(--color-text);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .display-content p {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--color-text2);
            margin-bottom: 12px;
        }

        .display-content .info-card {
            background: var(--color-light);
            border: 1px solid var(--color-tertiary);
            border-radius: var(--tab-radius-sm);
            padding: 16px 20px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--color-neutral);
            border-left: 4px solid var(--color-contrast);
        }

        .display-content .info-card strong {
            color: var(--color-text);
        }

        /* Hamburger button */
        .hamburger-btn {
            display: none;
            position: fixed;
            padding: 5px 5px 30px 5px;
            top: 20px;
            left: 10px;
            z-index: 10000;
            background: var(--color-text);
            color: var(--color-light);
            border: none;
            font-size: 1.2rem;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .hamburger-btn:hover {
            background: var(--color-opaquedark);
        }

        /* Overlay wrapper */
        .tab-overlay {
            cursor: pointer;
        }

        /* Overlay close button (inside overlay, hidden on desktop) */
        .overlay-close-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10001;
            background: transparent;
            border: none;
            font-size: 1.8rem;
            color: var(--color-text);
            cursor: pointer;
        }

        .hyperlinks {
            color: var(--color-text);
            font-size: 0.8rem;
            text-decoration: none;
            border-radius: 5px;
            padding: 10px 10px;
            margin: 5px 10px;
            background: var(--color-primary);
            white-space: nowrap;
            display: inline-block;

        }

        .hyperlinks:hover {
            border-radius: 12px;
            background: var(--color-opaquedark);
            color: var(--color-light);


        }

        #quickAccessBox {
            display: none;
        }

        /* Small screens: hide tab section by default, show hamburger */
        @media(max-width: 999px) {

            /* ── Overlay & hamburger ─── */
            .tab-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 9999;
                background: var(--color-light);
                overflow-y: auto;
                padding: 20px;
            }

            .tab-overlay.open {
                display: block;
            }

            .hamburger-btn {
                display: block;
            }

            .overlay-close-btn {
                display: block;
            }

            .tab-overlay .tab-section {
                width: 100%;
                max-width: 100%;
                padding: 0;
                margin-top: 40px;
                /* room for close button */
            }

            .tab-overlay .tab-container {
                min-height: 100%;
                border-radius: 0;
            }

            .ttabtext {
                display: none;
            }

            /* ttab‑bar: keep horizontal, scrollable */
            .ttab-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .ttab {
                flex-shrink: 0;
                white-space: nowrap;
                padding: 12px 16px;
            }

            /* Main body: stack vertically */
            .main-body {
                flex-direction: column;
            }

            /* ctab‑panel: turn into a horizontal row above the display */
            .ctab-panel {
                flex-direction: row;
                overflow-x: auto;
                white-space: nowrap;
                padding: 8px 12px;
                gap: 8px;
                border-right: none;
                border-bottom: 2px solid var(--color-tertiary);
                min-width: unset;
                max-width: 100%;
                width: 100%;
                flex-shrink: 0;
                background: var(--color-light);
            }

            .ctab {
                flex-shrink: 0;
                padding: 8px 14px;
                font-size: 2vw;
                border-radius: 20px;
                white-space: nowrap;
                box-shadow: none;
                transform: none;
            }

            .ctab:hover {
                transform: none;
                padding-left: 14px;
            }

            .ctab.active {
                box-shadow: inset 0 -3px 0 0 var(--color-text);
                padding-left: 14px;
                border-radius: 20px;
            }


            /* Display area: full width */
            .display-area {
                padding: 20px 16px;
                min-height: 200px;
            }

            #quickAccessBox {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- ========== ORIGINAL SEARCH SECTION ========== -->
    <div class="search-section">
        <div>
            <br><br><br><br><br>
            <h1>This is a personal homepage.</h1>
            <p>Click to search on the corresponding database or press enter to search on internet.</p>
            <br>

            <form id="searchForm" action="https://www.google.com/search" method="get">
<div style="display:flex; justify-content:space-between; align-items:center; width:80%; margin-left:auto; margin-right:auto;">
    <div style="display:flex; gap:5px;">
        <button type="button" class="searchTab" data-engine="https://www.google.com/search"
            onclick="setEngine('https://www.google.com/search', this)">Google</button>
        <button type="button" class="searchTab" data-engine="https://www.bing.com/search"
            onclick="setEngine('https://www.bing.com/search', this)">Bing</button>
    </div>
    <div style="display:flex;">
        <button class="imgbutton" type="button" onclick="searchSpecial('arxiv')">
            <img src="icon/arxiv.png" class="typeimg" alt="arXiv">
        </button>
        <button class="imgbutton" type="button" onclick="searchSpecial('GoogleScholar')">
            <img src="icon/googlescholar.png" class="typeimg" alt="googlescholar">
        </button>
    </div>
</div>

                <input id="searchInput" type="text" name="q" value="" placeholder="search web or database">
                <input type="submit" style="display:none;"> <!-- keep hidden or remove; it's fine either way -->
            </form>
        </div>
    </div>

    <!-- ========== DIVIDER ========== -->
    <div class="section-divider"></div>
    <!-- Quick Access standalone box -->
    <div id="quickAccessBox" class="tab-container">
        <br>
        <img style="margin-left: 10px;" src='icon/svg/star-sharp.svg' class="ttab-icon" alt="QuickAccess">Quick Access
        <div id="quickAccessLinks" class="display-area">
            <!-- dynamically filled -->
        </div>
    </div>
    <!-- ========== TABBED INTERFACE SECTION ========== -->
    <div class="tab-section">
        <!-- Hamburger button (visible only on small screens) -->
        <button id="tabHamburger" class="hamburger-btn" aria-label="Open tabs">☰</button>

        <!-- Overlay wrapper that holds the tab content -->
        <div id="tabOverlay" class="tab-overlay">
            <!-- Close button inside overlay (small screens) -->
            <button id="tabOverlayClose" class="overlay-close-btn" aria-label="Close tabs">✕</button>

            <div class="tab-section">
                <div class="tab-container">
                    <div class="ttab-bar" id="ttabBar">
                        <button class="ttab active" data-ttab="0"><img src='icon/svg/star-sharp.svg' class="ttab-icon"
                                alt="QuickAccess">
                            <p class="ttabtext">QuickAccess</p>
                        </button>
                        <button class="ttab" data-ttab="1"><img src='icon/svg/lightbulb-alt.svg' class="ttab-icon"
                                alt="Creation">
                            <p class="ttabtext">Creation</p>
                        </button>
                        <button class="ttab" data-ttab="2"><img src='icon/svg/gem-alt.svg' class="ttab-icon"
                                alt="Entertainment">
                            <p class="ttabtext">Entertainment</p>
                        </button>
                        <button class="ttab" data-ttab="3"><img src='icon/svg/paint-roller.svg' class="ttab-icon"
                                alt="Utilities">
                            <p class="ttabtext">Utilities</p>
                        </button>
                        <button class="ttab" data-ttab="4"><img src='icon/svg/notebook.svg' class="ttab-icon"
                                alt="Utilities">
                            <p class="ttabtext">Log</p>
                        </button>
                    </div>
                    <div class="main-body">
                        <div class="ctab-panel" id="ctabPanel"></div>
                        <div class="display-area" id="displayArea"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== COMBINED SCRIPTS ========== -->
    <script>
        // ──────────────────────────────────────────
        // SEARCH ENGINE MANAGEMENT
        // ──────────────────────────────────────────
        let currentEngine = 'https://www.google.com/search';

        // Load saved engine on startup
        window.addEventListener('DOMContentLoaded', () => {
            const savedEngine = localStorage.getItem('searchEngine');
            if (savedEngine) {
                currentEngine = savedEngine;
                const matchingTab = document.querySelector(`.searchTab[data-engine="${savedEngine}"]`);
                if (matchingTab) {
                    document.querySelectorAll('.searchTab').forEach(tab => tab.classList.remove('activeTab'));
                    matchingTab.classList.add('activeTab');
                }
            } else {
                const firstTab = document.querySelector('.searchTab');
                if (firstTab) firstTab.classList.add('activeTab');
            }
        });

        // Engine switching
        window.setEngine = function (url, element) {
            currentEngine = url;
            localStorage.setItem('searchEngine', url);
            document.querySelectorAll('.searchTab').forEach(tab => tab.classList.remove('activeTab'));
            element.classList.add('activeTab');
        };

        // Special icon search (does NOT affect the form)
        function searchSpecial(target) {
            const query = document.getElementById('searchInput').value.trim();

            if (target === 'arxiv') {
                if (!query) {
                    window.location.href = 'https://arxiv.org/';
                } else {
                    window.location.href = `https://arxiv.org/search/?query=${encodeURIComponent(query)}`;
                }
            }
            else if (target === 'chatgpt') {
                if (!query) {
                    window.location.href = 'https://arxiv.org/';
                } else {
                    window.location.href = `https://arxiv.org/search/?query=${encodeURIComponent(query)}`;
                }
            } else if (target === 'GoogleScholar') {
                if (!query) {
                    window.location.href = 'https://scholar.google.com/';
                } else {
                    window.location.href = `https://scholar.google.com/scholar?q=${encodeURIComponent(query)}`;
                }
            }
        }
        // Form submission (Enter key or hidden submit button) → always normal web search
        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            window.location.href = `${currentEngine}?q=${encodeURIComponent(query)}`;
        });

        // ──────────────────────────────────────────
        // 2. TABBED INTERFACE SCRIPT (ttab + ctab)
        // ──────────────────────────────────────────
        // ──────────────────────────────────────────
        // 2. TABBED INTERFACE SCRIPT (ttab + ctab)
        // ──────────────────────────────────────────
        (function () {
            // --- Load all JSON data first, then initialize ---
            Promise.all([
                fetch('json/quickaccess.json').then(r => r.json()),
                fetch('json/creation.json').then(r => r.json()),
                fetch('json/entertainment.json').then(r => r.json()),
                fetch('json/utilities.json').then(r => r.json()),
                fetch('json/log.json').then(r => r.json())
            ]).then(([quickAccess, creation, entertainment, utilities, log]) => {
                // Build the data array in the same order as your tabs
                const data = [
                    quickAccess,      // ttab 0
                    creation,         // ttab 1
                    entertainment,    // ttab 2
                    utilities,        // ttab 3
                    log               // ttab 4
                ];
                // Populate Quick Access box from data[0] (QuickAccess ttab)
                const quickAccessData = data[0];  // array of ctabs (usually one item)
                const qaLinksContainer = document.getElementById('quickAccessLinks');
                if (qaLinksContainer && quickAccessData.length) {
                    // assume only one ctab in QuickAccess with "links" type
                    const links = quickAccessData[0].links || [];
                    qaLinksContainer.innerHTML = links.map(link =>
                        `<a class="hyperlinks" href="${link.url}" target="_blank" rel="noopener">${link.name}</a>`
                    ).join('');
                }

                // ── Your existing tab logic (unchanged) ──
                let activeTtab = 0;
                let activeCtab = 0;

                const ttabBar = document.getElementById('ttabBar');
                const ctabPanel = document.getElementById('ctabPanel');
                const displayArea = document.getElementById('displayArea');
                const ttabButtons = ttabBar.querySelectorAll('.ttab');

                function renderCtabs(ttabIndex) {
                    const ctabsData = data[ttabIndex];
                    ctabPanel.innerHTML = '';
                    ctabsData.forEach((ctab, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'ctab';
                        if (idx === activeCtab) btn.classList.add('active');

                        if (ctab.icon) {
                            btn.innerHTML = `<img src="${ctab.icon}" class="ctab-icon" alt=""> ${ctab.label}`;
                        } else {
                            btn.textContent = ctab.label;
                        }

                        btn.setAttribute('data-ctab', idx);
                        btn.addEventListener('mouseenter', () => setActiveCtab(idx, ttabIndex));
                        btn.addEventListener('click', () => setActiveCtab(idx, ttabIndex));
                        btn.addEventListener('focus', () => setActiveCtab(idx, ttabIndex));
                        ctabPanel.appendChild(btn);
                    });
                }

                function setActiveCtab(ctabIndex, ttabIndex) {
                    activeCtab = ctabIndex;
                    const ctabButtons = ctabPanel.querySelectorAll('.ctab');
                    ctabButtons.forEach((btn, idx) => {
                        btn.classList.toggle('active', idx === ctabIndex);
                    });
                    updateDisplay(ttabIndex, ctabIndex);
                }

                function updateDisplay(ttabIndex, ctabIndex) {
                    const content = data[ttabIndex][ctabIndex];

                    if (content.type === 'links') {
                        const linksHtml = content.links.map(link =>
                            `<a class='hyperlinks' href="${link.url}" target="_blank" rel="noopener">${link.name}</a>`
                        ).join('');
                        displayArea.innerHTML = `<div class="display-content">${linksHtml}</div>`;
                    } else {
                        displayArea.innerHTML = `
                    <div class="display-content">
                        <h2>${content.title}</h2>
                        <span class="badge">${content.badge}</span>
                        <p>${content.description}</p>
                        <div class="info-card">${content.info}</div>
                    </div>`;
                    }
                }

                function switchTtab(ttabIndex) {
                    activeTtab = ttabIndex;
                    activeCtab = 0;
                    ttabButtons.forEach((btn, idx) => {
                        btn.classList.toggle('active', idx === ttabIndex);
                    });
                    renderCtabs(ttabIndex);
                    updateDisplay(ttabIndex, 0);
                }

                ttabButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.getAttribute('data-ttab'), 10);
                        if (idx !== activeTtab) switchTtab(idx);
                    });
                    btn.addEventListener('mouseenter', () => {
                        const idx = parseInt(btn.getAttribute('data-ttab'), 10);
                        if (idx !== activeTtab) switchTtab(idx);
                    });
                });

                // Initialize: default ttab 0 active
                renderCtabs(0);
                updateDisplay(0, 0);

            }).catch(error => {
                console.error('Failed to load tab data:', error);
            });
        })();
        // Toggle overlay on small screens
        // Toggle overlay on small screens
        (function () {
            const hamburger = document.getElementById('tabHamburger');
            const overlay = document.getElementById('tabOverlay');
            const closeBtn = document.getElementById('tabOverlayClose');

            if (hamburger && overlay && closeBtn) {
                function openOverlay() {
                    overlay.classList.add('open');
                }
                function closeOverlay() {
                    overlay.classList.remove('open');
                }

                hamburger.addEventListener('click', openOverlay);
                hamburger.addEventListener('mouseenter', openOverlay);   // ← added hover
                closeBtn.addEventListener('click', closeOverlay);
            }
        })();

    </script>
</body>

</html>
